name: Deploy to Vercel

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      PORT: ${{ secrets.PORT }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Debug secrets (safe)
        run: |
          echo "=== CHECK SECRET EXISTENCE ==="
          [ -z "$VERCEL_TOKEN" ] && echo "VERCEL_TOKEN: EMPTY" || echo "VERCEL_TOKEN: OK"
          [ -z "$VERCEL_ORG_ID" ] && echo "VERCEL_ORG_ID: EMPTY" || echo "VERCEL_ORG_ID: OK"
          [ -z "$VERCEL_PROJECT_ID" ] && echo "VERCEL_PROJECT_ID: EMPTY" || echo "VERCEL_PROJECT_ID: OK"

          echo ""
          echo "=== CHECK TOKEN FORMAT ==="
          echo "$VERCEL_TOKEN" | grep -q "^vercel_" && echo "TOKEN FORMAT: VALID" || echo "TOKEN FORMAT: INVALID"

          echo ""
          echo "=== CHECK FOR DANGEROUS CHAR ==="
          echo "$VERCEL_TOKEN" | grep -q "\$" && echo "TOKEN CONTAINS \$ (BAD)" || echo "TOKEN CLEAN"

      - name: Pull Vercel environment variables
        run: |
          mkdir -p .vercel
          echo '{"projectId":"'"$VERCEL_PROJECT_ID"'","orgId":"'"$VERCEL_ORG_ID"'"}' > .vercel/project.json
          vercel pull --yes --environment=production --token=$VERCEL_TOKEN

      - name: Set environment variables on Vercel
        run: |
          echo "$DATABASE_URL" | vercel env add DATABASE_URL production --token=$VERCEL_TOKEN --force || true
          echo "$PORT" | vercel env add PORT production --token=$VERCEL_TOKEN --force || true

      - name: Install dependencies
        run: npm install

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Build project
        run: vercel build --prod --token=$VERCEL_TOKEN

      - name: Deploy to Vercel
        run: vercel deploy --prebuilt --prod --token=$VERCEL_TOKEN
